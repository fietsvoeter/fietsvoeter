name: Bol.com Affiliate Links

on:
  push:
    paths:
      - 'content/blog/**.mdx'
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  affiliate-links:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verwerk bol.com affiliate links
        env:
          BOL_CLIENT_ID: ${{ secrets.BOL_CLIENT_ID }}
          BOL_CLIENT_SECRET: ${{ secrets.BOL_CLIENT_SECRET }}
          BOL_PARTNER_ID: ${{ secrets.BOL_PARTNER_ID }}
        run: node scripts/affiliate-links.js

      - name: Commit en push bijgewerkte links
        run: |
          git config --local user.email "affiliate-bot@fietsvoeter.nl"
          git config --local user.name "Fietsvoeter Affiliate Bot"
          git add content/blog/*.mdx scripts/affiliate-cache.json
          git diff --staged --quiet && echo "Geen wijzigingen — klaar" && exit 0
          git commit -m "Auto: bol.com affiliate links bijgewerkt [skip ci]"
          git pull --rebase origin main
          git push --force-with-lease origin main
